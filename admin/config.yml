backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "settings"
    label: "Site Ayarları"
    files:
      - file: "admin/content.json"
        label: "Görsel ve İçerik Yönetimi"
        name: "content"
        fields:
          - {label: "Arka Plan Görseli (Gece Boğazı)", name: "background_image", widget: "image"}
          - {label: "Ana Başlık (İngilizce)", name: "hero_title", widget: "string", required: false}

      - file: "admin/portfolios.json"
        label: "Lüks Portföy Yönetimi"
        name: "portfolios_list"
        fields:
          - label: "Yatırım Portföyleri"
            name: "items"
            widget: "list"
            fields:
              - {label: "İlan Başlığı", name: "title", widget: "string"}
              - {label: "Fiyat ($ ya da ₺)", name: "price", widget: "string"}
              - {label: "Konum (Örn: Bebek / Beşiktaş)", name: "location", widget: "string"}
              - {label: "Oda / Metrekare Detayı", name: "details", widget: "string"}
              - {label: "Kapak Fotoğrafı", name: "thumbnail", widget: "image"}
              - {label: "İlan Kısa Açıklaması", name: "description", widget: "text"}
