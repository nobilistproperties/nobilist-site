backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "settings"
    label: "Global Site Settings"
    files:
      - file: "admin/content.json"
        label: "Hero & Brand Content"
        name: "content"
        fields:
          - {label: "Hero Background Image", name: "background_image", widget: "image"}
          - {label: "Main Title (English)", name: "hero_title_en", widget: "string"}
          - {label: "Main Title (Turkish)", name: "hero_title_tr", widget: "string"}
          - {label: "Brand Description (English)", name: "desc_en", widget: "text"}
          - {label: "Brand Description (Turkish)", name: "desc_tr", widget: "text"}

      - file: "admin/portfolios.json"
        label: "Premium Portfolio Management"
        name: "portfolios_list"
        fields:
          - label: "Investment Real Estate List"
            name: "items"
            widget: "list"
            fields:
              - {label: "Property Title (English)", name: "title_en", widget: "string"}
              - {label: "Property Title (Turkish)", name: "title_tr", widget: "string"}
              - {label: "Price (e.g. $2,500,000)", name: "price", widget: "string"}
              - {label: "Location (English - e.g. Bebek, Bosphorus)", name: "location_en", widget: "string"}
              - {label: "Location (Turkish - e.g. Bebek, Boğaziçi)", name: "location_tr", widget: "string"}
              - {label: "Specifications (e.g. 5+2 / 450 sqm)", name: "details", widget: "string"}
              - {label: "Cover Image", name: "thumbnail", widget: "image"}
              - {label: "Detailed Description (English)", name: "description_en", widget: "text"}
              - {label: "Detailed Description (Turkish)", name: "description_tr", widget: "text"}
