backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "settings"
    label: "Site Ayarları"
    files:
      - file: "admin/content.json"
        label: "Görsel ve İçerik Yönetimi"
        name: "content"
        fields:
          - {label: "Arka Plan Görseli (Gece Boğazı)", name: "background_image", widget: "image"}
          - {label: "Ana Başlık (İngilizce)", name: "hero_title", widget: "string", required: false}

  - name: "portfolios"
    label: "Lüks Portföyler"
    folder: "portfolios"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "İlan Başlığı (Örn: Bebek'te Yalı Dairesi)", name: "title", widget: "string"}
      - {label: "Fiyat ($ veya ₺)", name: "price", widget: "string"}
      - {label: "Konum", name: "location", widget: "string"}
      - {label: "Oda Sayısı / m²", name: "details", widget: "string"}
      - {label: "Kapak Fotoğrafı", name: "thumbnail", widget: "image"}
      - {label: "Öne Çıkan Özellikler ve İlan Açıklaması", name: "body", widget: "markdown"}
